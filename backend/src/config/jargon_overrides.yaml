# ============================================================
# OmniData — Jargon Overrides (User-Defined)
# ============================================================
# Custom terms that should be rewritten in final responses.
# Users can add entries via POST /jargon endpoint or edit this file.
#
# Format:
#   - term: "TECHNICAL_TERM"         # What to find (case-sensitive)
#     replacement: "Human Friendly"  # What to replace it with
#     category: "snowflake"          # Optional: snowflake, salesforce, internal
#
# These are MERGED with the auto-generated jargon map from
# the Metric Dictionary at runtime.
# ============================================================

overrides:
